<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pixel Shop - Tai Khoan Game</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="shop-badge">P</div>
    <div class="shop-title">
      <h1>Pixel Shop</h1>
      <span>Tai Khoan Game</span>
    </div>
    <div class="status-pill"><span class="dot"></span> Online</div>
    <div class="avatar" id="avatarInitial">?</div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="auth">🔒<span>Auth</span></button>
    <button class="tab" data-tab="shop">🛍️<span>Shop</span></button>
    <button class="tab" data-tab="history">🕓<span>History</span></button>
    <button class="tab" data-tab="info">ℹ️<span>Info</span></button>
    <button class="tab" data-tab="nap">💳<span>Nap</span></button>
    <button class="tab" data-tab="myshop">🏠<span>My Shop</span></button>
  </nav>

  <main id="content"></main>
</div>
<script src="app.js"></script>
</body>
</html>
